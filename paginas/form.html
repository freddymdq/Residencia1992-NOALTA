<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMULARIO RESERVA</title>

    <!--BOOTSTRAP LINK-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
    <!--ICONOS BOOTSTRAP-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css">
    <!--ANIMACIONES LINK-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!--CSS-->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-dark">

    <!--FORMULARIO RESERVA FALTA MODIFICACIONES-->
    <div class="container bg-primary mt-5">
        <a href="../index.html"><img src="../multimedia/imagenes/residencialogo.png" width="80" alt="Logo Residencia" class="text-center mt-4"></a>
        <form class="row g-3 mt-4">
            <div class="col-6">
                <label for="nameInput" class="form-label text-light">Nombre</label>
                <input type="text" class="form-control" id="nameInput" placeholder="Nombre">
            </div>

            <div class="col-6">
                <label for="name2Input" class="form-label text-light">Apellido</label>
                <input type="text" class="form-control" id="name2Input" placeholder="Apellido">
            </div>

            <div class="col-6">
                <label for="inputdoc" class="form-label text-light">N° Documento</label>
                <input type="text" class="form-control" id="inputdoc" placeholder="DNI">
            </div>

            <div class="col-6">
                <label for="inputAge" class="form-label text-light">Edad</label>
                <input type="text" class="form-control" id="inputAge" placeholder="Edad">
            </div>

            <div class="col-12">
                <label for="inputAdress" class="form-label text-light">Dirección</label>
                <input type="text" class="form-control" id="inputAdress" placeholder="Dirección">
            </div>

            <div class="col-6">
                <label for="inputCel" class="form-label text-light">Telefono</label>
                <input type="text" class="form-control" id="inputCel" placeholder="Telefono">
            </div>

            <div class="col-6">
                <label for="inputCel1" class="form-label text-light">Telefono 2</label>
                <input type="text" class="form-control" id="inputCel1" placeholder="Telefono 2">
            </div>

            <div class="col-6">
                <label for="cityInput" class="form-label text-light">Ciudad</label>
                <input type="text" class="form-control" id="cityInput" placeholder="Ciudad">
            </div>

            <div class="col-3">
                <label for="postalCodeInput" class="form-label text-light">C. Postal</label>
                <input type="text" class="form-control" id="postalCodeInput" placeholder="CodigoPostal">
            </div>

            <div class="col-3">
                <label for="countryInput" class="form-label text-light">Pais</label>
                <input type="text" class="form-control" id="countryInput" placeholder="Pais">
            </div>

            <div class="col-6">
                <label for="dateInput" class="form-label text-light">Desde</label>
                <input type="text" class="form-control" id="dateInput" placeholder="Desde ej: D/M/A">
            </div>

            <div class="col-6">
                <label for="date1Input" class="form-label text-light">Hasta</label>
                <input type="text" class="form-control" id="date1Input" placeholder="Hasta ej: D/M/A">
            </div>

            <div class="col-12">
                <div class="form-check">
                    <input type="checkbox" id="checkTerms" class="form-check-input">
                    <label for="checkTerms" class="form-check-label text-light">Acepto los Terminos</label>
                </div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn btn-danger mb-3">Reserva</button>
            </div>
        </form>
    </div>
    <!--FIN FORMULARIO-->


    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js" integrity="sha384-Xe+8cL9oJa6tN/veChSP7q+mnSPaj5Bcu9mPX5F5xIGE0DVittaqT5lorf0EI7Vk" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.min.js" integrity="sha384-kjU+l4N0Yf4ZOJErLsIcvOU2qSb74wXpOhqTvwVx3OElZRweTnQ6d31fXEoRD1Jy" crossorigin="anonymous"></script>
</body>

</html>
